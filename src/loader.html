<!DOCTYPE html>
<html><head><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .chip {
    background: rgba(250,247,240,0.95);
    backdrop-filter: blur(40px) saturate(1.6);
    -webkit-backdrop-filter: blur(40px) saturate(1.6);
    border-radius: 20px;
    border: 0.5px solid rgba(44,36,22,0.08);
    box-shadow: 0 4px 20px rgba(44,36,22,0.10);
    padding: 6px 14px 6px 8px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    animation: chipIn 0.18s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    transform: translateY(-3px) scale(0.96);
  }
  @keyframes chipIn { to { opacity:1; transform:translateY(0) scale(1); } }
  .fennec {
    width: 20px; height: 20px;
    border-radius: 50%;
    object-fit: cover;
    animation: breathe 1.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .text { font-size:12px; font-weight:500; color:#8A7D6B; }
  .dots span { animation: dotFade 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay:0.2s; }
  .dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes dotFade { 0%,60%,100%{opacity:0.2} 30%{opacity:1} }
</style></head>
<body>
  <div class="chip">
    <img class="fennec" src="../src-tauri/icons/fennec_clean.png">
    <span class="text">Thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
  </div>
</body></html>
