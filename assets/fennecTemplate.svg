  <!-- Right ear -->
  <path d="M25 3 L20 14 L28 14 Z" fill="black"/>
  <!-- Head -->
  <ellipse cx="16" cy="19" rx="9" ry="8" fill="black"/>
  <!-- Left eye -->
  <ellipse cx="12.5" cy="17.5" rx="2" ry="2" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="19.5" cy="17.5" rx="2" ry="2" fill="white"/>
