  <ellipse cx="16" cy="21.5" rx="1.5" ry="1" fill="white"/>
  <!-- Inner left ear -->
  <path d="M7.5 6 L6 13 L11 13 Z" fill="white" opacity="0.3"/>
  <!-- Inner right ear -->
  <path d="M24.5 6 L21 13 L27 13 Z" fill="white" opacity="0.3"/>
