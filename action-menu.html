<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fennec Actions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script type="module" src="/src/action-menu.ts" defer></script>
    <style>
      :root {
        --bg: #faf6f1;
        --surface: #ffffff;
        --surface-border: rgba(0, 0, 0, 0.07);
        --text: #1c1c1e;
        --text-secondary: #6e6e73;
        --sage: #7a9b6d;
        --sage-bg: rgba(122, 155, 109, 0.08);
        --hover: rgba(0, 0, 0, 0.04);
        --divider: rgba(0, 0, 0, 0.06);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1b19;
          --surface: #2a2927;
          --surface-border: rgba(255, 255, 255, 0.08);
          --text: #e5e5e7;
          --text-secondary: #98989d;
          --sage: #8aad7c;
          --sage-bg: rgba(138, 173, 124, 0.10);
          --hover: rgba(255, 255, 255, 0.06);
          --divider: rgba(255, 255, 255, 0.06);
        }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        overflow: hidden;
        background: var(--bg);
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", -apple-system, system-ui, sans-serif;
        font-size: 13px;
        color: var(--text);
        -webkit-user-select: none;
        user-select: none;
      }

      .menu {
        animation: popIn 0.12s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes popIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .action {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 14px;
        border: none;
        background: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        font-weight: 400;
        color: var(--text);
        text-align: left;
        transition: background 0.08s;
        outline: none;
      }

      .action:hover,
      .action.selected {
        background: var(--sage-bg);
      }

      .action + .action {
        border-top: 1px solid var(--divider);
      }

      .action-icon {
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--sage);
        flex-shrink: 0;
      }

      .action-label {
        flex: 1;
      }

      .action-hint {
        font-size: 11px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="menu">
      <button class="action" data-action="formal">
        <div class="action-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 2h8l1 4H3l1-4z"/>
            <path d="M8 6v8"/>
            <path d="M5 14h6"/>
          </svg>
        </div>
        <span class="action-label">More formal</span>
      </button>
      <button class="action" data-action="informal">
        <div class="action-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="6"/>
            <path d="M5.5 9.5c.5 1 1.5 1.5 2.5 1.5s2-.5 2.5-1.5"/>
            <circle cx="6" cy="6.5" r="0.5" fill="currentColor"/>
            <circle cx="10" cy="6.5" r="0.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="action-label">More casual</span>
      </button>
      <button class="action" data-action="concise">
        <div class="action-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h8M4 8h5M4 12h3"/>
          </svg>
        </div>
        <span class="action-label">Make it shorter</span>
      </button>
    </div>
  </body>
</html>
